apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-management-backend
  template:
    metadata:
      name: backend-pod
      labels:
        app: task-management-backend
        tier: web
    spec:
      containers:
        - name: backend-container
          image: krishp234/task-management-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                configMapKeyRef:
                  name: sql-configmap
                  key: db_url
                  
